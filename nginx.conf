# Nginx reverse proxy config for genifem-attendance
#
# Setup:
#   sudo cp nginx.conf /etc/nginx/sites-available/genifem-attendance
#   sudo ln -s /etc/nginx/sites-available/genifem-attendance /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# For HTTPS (required for Slack):
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d attendance.yourdomain.com

# Rate limit zone: 10 req/sec per IP with burst
limit_req_zone $binary_remote_addr zone=slack:10m rate=10r/s;

server {
    listen 80;
    server_name attendance.yourdomain.com;

    # Redirect HTTP to HTTPS (uncomment after certbot setup)
    # return 301 https://$host$request_uri;

    # Only allow POST to /slack/events and GET to /health
    location /slack/events {
        limit_req zone=slack burst=20 nodelay;

        # Only allow POST
        if ($request_method !~ ^(POST)$) {
            return 405;
        }

        # Reject oversized payloads
        client_max_body_size 64k;

        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 10;

        # Security headers
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
    }

    location /health {
        if ($request_method !~ ^(GET)$) {
            return 405;
        }

        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Block everything else
    location / {
        return 404;
    }
}
